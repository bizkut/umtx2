name: Deploy to Github Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  # Twice daily: 06:00 and 18:00 UTC
  schedule:
    - cron: '0 6 * * *'    # 06:00 UTC
    - cron: '0 18 * * *'   # 18:00 UTC

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-payloads:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.update.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install pyyaml requests

      - name: Update payloads
        id: update
        run: |
          python .github/scripts/update_payloads.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Always regenerate cache.appcache so the committed manifest is in sync
      # with the latest payload_map.js. Previously this ran in the deploy job
      # without committing, which left the repo's cache.appcache stale and
      # broke local testing / desync detection.
      - name: Regenerate cache.appcache
        run: |
          python appcache_manifest_generator.py -d document/en/ps5

      - name: Run cache/payload sync tests
        run: |
          python .github/scripts/run_tests.py

      - name: Commit changes
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            # Get list of changed payloads
            CHANGES=$(git diff --name-only | grep 'payloads/.*/metadata.json' | sed 's|document/en/ps5/payloads/||g' | sed 's|/metadata.json||g' | tr '\n' ', ' | sed 's/,$//')

            # Detect cache.appcache regeneration even when no payloads changed
            CACHE_CHANGED=""
            if git diff --name-only | grep -q 'document/en/ps5/cache.appcache'; then
              CACHE_CHANGED="cache.appcache"
            fi

            COMMIT_SUBJECT=""
            if [ -n "$CHANGES" ]; then
              COMMIT_SUBJECT="chore(payloads): update $CHANGES"
            elif [ -n "$CACHE_CHANGED" ]; then
              COMMIT_SUBJECT="chore(cache): regenerate $CACHE_CHANGED"
            fi

            if [ -n "$COMMIT_SUBJECT" ]; then
              git add .
              git commit -m "$COMMIT_SUBJECT

          Automated update:
          - Synced with latest GitHub releases
          - Regenerated cache.appcache to match payload_map.js
          - Verified default versions are present in cache

          Run: $(date '+%Y-%m-%d %H:%M UTC')"
              git push
            fi
          fi

  deploy:
    needs: update-payloads
    # Only deploy when the update-payloads job (which runs the security
    # tests + commit) succeeded. Previously this was `if: always()`, which
    # would ship even on test failure.
    if: ${{ needs.update-payloads.result == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # cache.appcache is regenerated and committed in the update-payloads job,
      # so we don't need to rebuild it here. This guarantees the repo's
      # committed manifest matches what gets deployed.

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'document/en/ps5'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
